version: "3"

vars:
  # main ブランチ名（プロジェクトによって異なる場合に上書き可）
  MAIN_BRANCH: '{{.MAIN_BRANCH | default "main"}}'
  # 開発統合ブランチ名（指定すると stage 経由フローを採用する）
  # 未指定（空文字）の場合は従来通り main 起点の単発 PR フロー
  # 指定時は STAGE_BRANCH 上で release を実行し、
  # release/* → STAGE_BRANCH と release/* → MAIN_BRANCH の並列 PR フローになる
  STAGE_BRANCH: '{{.STAGE_BRANCH | default ""}}'

tasks:
  release:
    desc: "リリース PR を作成（task release VERSION=v0.1.0 または task release BUMP=minor）"
    vars:
      LATEST_TAG:
        sh: git describe --tags --abbrev=0 2>/dev/null || echo ""
      NEXT_VERSION:
        sh: |
          if [ -n "{{.VERSION}}" ]; then
            echo "{{.VERSION}}"
          elif [ -n "{{.BUMP}}" ]; then
            latest="{{.LATEST_TAG}}"
            if [ -z "$latest" ]; then
              case "{{.BUMP}}" in
                major) echo "v1.0.0" ;;
                minor) echo "v0.1.0" ;;
                patch) echo "v0.0.1" ;;
              esac
            else
              v="${latest#v}"
              major="${v%%.*}"
              rest="${v#*.}"
              minor="${rest%%.*}"
              patch="${rest#*.}"
              case "{{.BUMP}}" in
                major) echo "v$((major+1)).0.0" ;;
                minor) echo "v${major}.$((minor+1)).0" ;;
                patch) echo "v${major}.${minor}.$((patch+1))" ;;
              esac
            fi
          else
            echo ""
          fi
      # 起点ブランチ: STAGE_BRANCH が指定されていればそれ、未指定なら MAIN_BRANCH
      BASE_BRANCH: "{{if .STAGE_BRANCH}}{{.STAGE_BRANCH}}{{else}}{{.MAIN_BRANCH}}{{end}}"
    preconditions:
      - sh: '[ -n "{{.NEXT_VERSION}}" ]'
        msg: "VERSION または BUMP を指定してください（例: task release VERSION=v0.1.0 / task release BUMP=minor）"
      - sh: 'echo "{{.NEXT_VERSION}}" | grep -qE "^v[0-9]+\.[0-9]+\.[0-9]+$"'
        msg: "バージョン形式が不正です。vX.Y.Z 形式で指定してください（例: v0.1.0）"
      - sh: 'git tag -l "{{.NEXT_VERSION}}" | grep -q . && exit 1 || exit 0'
        msg: "タグ {{.NEXT_VERSION}} は既に存在します"
    cmds:
      - task: release:preflight
        vars:
          BASE_BRANCH: "{{.BASE_BRANCH}}"
      - task: release:branch
        vars:
          TAG: "{{.NEXT_VERSION}}"
          BASE_BRANCH: "{{.BASE_BRANCH}}"
      - task: release:changelog
        vars:
          TAG: "{{.NEXT_VERSION}}"
      - task: release:pr
        vars:
          TAG: "{{.NEXT_VERSION}}"

  release:complete:
    desc: "リリース PR のマージを確認してタグを作成（task release:complete VERSION=v0.1.0）"
    vars:
      TAG: "{{.VERSION}}"
    preconditions:
      - sh: '[ -n "{{.TAG}}" ]'
        msg: "VERSION を指定してください（例: task release:complete VERSION=v0.1.0）"
      - sh: 'echo "{{.TAG}}" | grep -qE "^v[0-9]+\.[0-9]+\.[0-9]+$"'
        msg: "バージョン形式が不正です。vX.Y.Z 形式で指定してください（例: v0.1.0）"
      - sh: 'git tag -l "{{.TAG}}" | grep -q . && exit 1 || exit 0'
        msg: "タグ {{.TAG}} は既に存在します"
    cmds:
      - task: release:verify-merged
        vars:
          TAG: "{{.TAG}}"
      - task: release:tag
        vars:
          TAG: "{{.TAG}}"

  release:preflight:
    desc: リリース前チェック
    internal: true
    cmds:
      - cmd: echo "==> ブランチ・ワークツリーを確認中..."
        silent: true
      - cmd: |
          current=$(git branch --show-current)
          if [ "$current" != "{{.BASE_BRANCH}}" ]; then
            echo "  ⚠ 現在 $current ブランチです。release は {{.BASE_BRANCH}} ブランチ上で実行してください。"
            exit 1
          else
            echo "  ✓ {{.BASE_BRANCH}} ブランチです"
          fi
        silent: true
      - cmd: |
          if ! git diff --quiet || ! git diff --cached --quiet; then
            echo "  ⚠ 追跡済みファイルに未コミット変更があります:"
            git status --short
            echo ""
            echo "  リリース前にコミットまたはスタッシュしてください。"
            exit 1
          else
            echo "  ✓ 追跡済みファイルに未コミット変更はありません"
          fi
        silent: true
      - cmd: |
          if [ -f CHANGELOG.md ]; then
            echo "  ✓ CHANGELOG.md を検出しました"
          else
            echo "  ⚠ CHANGELOG.md が見つかりません"
            exit 1
          fi
        silent: true

  release:branch:
    desc: リリースブランチを作成
    internal: true
    cmds:
      - cmd: |
          branch="release/{{.TAG}}"
          git checkout -b "$branch"
          echo "  ✓ ブランチ $branch を作成しました ({{.BASE_BRANCH}} 起点)"
        silent: true

  release:changelog:
    desc: CHANGELOG.md の Unreleased セクションをバージョンセクションに切り出してコミット
    internal: true
    cmds:
      - cmd: bash "{{.TASKFILE_DIR}}/../scripts/release-changelog.sh" "{{.TAG}}"
        silent: true

  release:pr:
    desc: リリースブランチを push して PR を作成し auto-merge を設定
    internal: true
    cmds:
      - cmd: |
          branch="release/{{.TAG}}"
          git push -u origin "$branch"
          echo "  ✓ $branch を push しました"
        silent: true
      - cmd: |
          branch="release/{{.TAG}}"
          if [ -n "{{.STAGE_BRANCH}}" ]; then
            # ──── stage 経由フロー（直列）: release → stage を待ってから stage → main ────
            # PR1: release/<TAG> → stage
            stage_pr=$(gh pr create \
              --base "{{.STAGE_BRANCH}}" \
              --head "$branch" \
              --title "chore(release): {{.TAG}}" \
              --body "## Summary
          - CHANGELOG.md を {{.TAG}} 用に更新

          このPRは \`task release\` により自動作成されました。
          {{.STAGE_BRANCH}} に CHANGELOG を反映するためのリリース PR です。")
            echo "  ✓ {{.STAGE_BRANCH}} 向け PR を作成しました: $stage_pr"
            gh pr merge "$stage_pr" --squash --auto
            echo "  ✓ {{.STAGE_BRANCH}} 向け PR の auto-merge を設定しました"
            echo ""
            echo "==> {{.STAGE_BRANCH}} 向け PR のマージを待機中..."
            # auto-merge 完了を polling（タイムアウト: 30 分）
            elapsed=0
            timeout=1800
            while [ "$(gh pr view "$stage_pr" --json state -q .state 2>/dev/null)" != "MERGED" ]; do
              if [ "$elapsed" -ge "$timeout" ]; then
                echo "  ⚠ タイムアウト: PR がマージされませんでした"
                echo "  手動でマージを確認してから再実行してください: $stage_pr"
                exit 1
              fi
              sleep 15
              elapsed=$((elapsed + 15))
            done
            echo "  ✓ {{.STAGE_BRANCH}} 向け PR がマージされました"

            # stage を最新化（PR1 のマージ結果を取り込む）
            git checkout "{{.STAGE_BRANCH}}"
            git pull origin "{{.STAGE_BRANCH}}"
            echo "  ✓ {{.STAGE_BRANCH}} を最新化しました"

            # PR2: stage → main（head が permanent branch なので auto-delete されない）
            main_pr=$(gh pr create \
              --base "{{.MAIN_BRANCH}}" \
              --head "{{.STAGE_BRANCH}}" \
              --title "chore(release): {{.TAG}}" \
              --body "## Summary
          - {{.STAGE_BRANCH}} の全 feature 群を {{.MAIN_BRANCH}} にリリース
          - CHANGELOG.md を {{.TAG}} 用に更新

          このPRは \`task release\` により自動作成されました。
          {{.MAIN_BRANCH}} 向けの正式リリース PR です。")
            echo "  ✓ {{.MAIN_BRANCH}} 向け PR を作成しました: $main_pr"
            gh pr merge "$main_pr" --squash --auto
            echo "  ✓ {{.MAIN_BRANCH}} 向け PR の auto-merge を設定しました"
          else
            # ──── 従来フロー: main 単発 ────
            pr_url=$(gh pr create \
              --base "{{.MAIN_BRANCH}}" \
              --head "$branch" \
              --title "chore(release): {{.TAG}}" \
              --body "## Summary
          - CHANGELOG.md を {{.TAG}} 用に更新

          このPRは \`task release\` により自動作成されました。")
            echo "  ✓ PR を作成しました: $pr_url"
            gh pr merge --squash --auto
            echo "  ✓ auto-merge を設定しました"
          fi
        silent: true
      - cmd: |
          echo ""
          echo "==> PR がマージされたら以下を実行してください:"
          echo "    task release:complete VERSION={{.TAG}}"
        silent: true

  release:verify-merged:
    desc: リリース PR がマージ済みか確認
    internal: true
    cmds:
      - cmd: |
          branch="release/{{.TAG}}"
          if [ -n "{{.STAGE_BRANCH}}" ]; then
            # stage 経由フロー（直列）: 最新の stage → main PR と release → stage PR を確認
            main_state=$(gh pr list --head "{{.STAGE_BRANCH}}" --base "{{.MAIN_BRANCH}}" --state all --limit 1 --json state --jq '.[0].state // "NOT_FOUND"' 2>/dev/null || echo "NOT_FOUND")
            stage_state=$(gh pr list --head "$branch" --base "{{.STAGE_BRANCH}}" --state all --json state --jq '.[0].state // "NOT_FOUND"' 2>/dev/null || echo "NOT_FOUND")
            if [ "$stage_state" != "MERGED" ]; then
              echo "  ⚠ {{.STAGE_BRANCH}} 向け PR ($branch) がまだマージされていません (state: $stage_state)"
              echo "  PR をマージしてから再実行してください。"
              exit 1
            fi
            if [ "$main_state" != "MERGED" ]; then
              echo "  ⚠ {{.MAIN_BRANCH}} 向け PR ({{.STAGE_BRANCH}} → {{.MAIN_BRANCH}}) がまだマージされていません (state: $main_state)"
              echo "  PR をマージしてから再実行してください。"
              exit 1
            fi
            echo "  ✓ 両 PR がマージ済みです（release/{{.TAG}} → {{.STAGE_BRANCH}} / {{.STAGE_BRANCH}} → {{.MAIN_BRANCH}}）"
          else
            state=$(gh pr view "$branch" --json state --jq '.state' 2>/dev/null || echo "NOT_FOUND")
            if [ "$state" = "MERGED" ]; then
              echo "  ✓ PR ($branch) はマージ済みです"
            else
              echo "  ⚠ PR ($branch) がまだマージされていません（state: $state）"
              echo "  PR をマージしてから再実行してください。"
              exit 1
            fi
          fi
        silent: true

  release:tag:
    desc: main を最新化してリリースタグを作成・push
    internal: true
    cmds:
      - cmd: |
          git checkout {{.MAIN_BRANCH}}
          git pull origin {{.MAIN_BRANCH}}
          echo "  ✓ {{.MAIN_BRANCH}} を最新化しました"
        silent: true
      - git tag -a {{.TAG}} -m "Release {{.TAG}}"
      - git push origin {{.TAG}}
      - cmd: echo "==> {{.TAG}} を push しました。GitHub Actions が Release を作成します。"
        silent: true

  release:status:
    desc: 最新タグと main との差分を表示
    cmds:
      - cmd: |
          echo "==> リリース状態"
          latest=$(git describe --tags --abbrev=0 2>/dev/null || echo "(タグなし)")
          echo "  最新タグ: $latest"

          if [ "$latest" != "(タグなし)" ]; then
            count=$(git rev-list ${latest}..{{.MAIN_BRANCH}} --count 2>/dev/null || echo "?")
            echo "  未リリースコミット: ${count}"
            if [ "$count" != "0" ] && [ "$count" != "?" ]; then
              echo ""
              echo "  未リリースの変更:"
              git log ${latest}..{{.MAIN_BRANCH}} --oneline --no-decorate | head -20
            fi
          fi
        silent: true

  release:list:
    desc: 過去のタグ一覧を表示
    cmds:
      - git tag --list --sort=-v:refname | head -20
